# ─────────────────────────────────────────────────────────────
# ANOPE SERVICES INTEGRATION (optional)
# ─────────────────────────────────────────────────────────────
services:
  enabled: false
  chanserv_op: true              # Request ChanServ op on join
  vhost: ""                      # HostServ vhost to set on connect
