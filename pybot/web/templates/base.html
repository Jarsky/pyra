<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pyra Admin{% endblock %} — Pyra IRC Bot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="/static/htmx.min.js"></script>
  <style>
    :root { --sidebar-width: 220px; }
    body { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--card-background-color);
      border-right: 1px solid var(--muted-border-color);
      padding: 1rem;
      flex-shrink: 0;
    }
    .sidebar h3 { margin-bottom: 1rem; color: var(--primary); }
    .sidebar nav a {
      display: block;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      color: var(--color);
      text-decoration: none;
    }
    .sidebar nav a:hover, .sidebar nav a.active {
      background: var(--primary);
      color: var(--primary-inverse);
    }
    .main-content { flex: 1; padding: 1.5rem; overflow-x: auto; }
    .status-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: 4px;
    }
    .status-dot.online { background: #28a745; }
    .status-dot.offline { background: #dc3545; }
    .mono { font-family: monospace; }
    .log-container {
      background: #0d0d0d; color: #ccc;
      padding: 0.8rem; border-radius: 4px;
      height: 400px; overflow-y: auto;
      font-family: monospace; font-size: 0.85rem;
    }
    .console-input { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .console-input input { flex: 1; font-family: monospace; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<aside class="sidebar">
  <h3>🔥 Pyra</h3>
  <nav>
    <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Dashboard</a>
    <a href="/channels" {% if request.url.path.startswith('/channels') %}class="active"{% endif %}>Channels</a>
    <a href="/users" {% if request.url.path.startswith('/users') %}class="active"{% endif %}>Users</a>
    <a href="/plugins" {% if request.url.path.startswith('/plugins') %}class="active"{% endif %}>Plugins</a>
    <a href="/logs" {% if request.url.path.startswith('/logs') %}class="active"{% endif %}>Logs</a>
    <a href="/settings" {% if request.url.path.startswith('/settings') %}class="active"{% endif %}>Settings</a>
    <a href="/console" {% if request.url.path.startswith('/console') %}class="active"{% endif %}>Console</a>
  </nav>
  <hr>
  <small>Logged in as <strong>{{ username }}</strong></small><br>
  <form action="/auth/logout" method="post" style="margin-top:0.5rem">
    <button type="submit" class="secondary outline" style="width:100%;padding:0.3rem">Logout</button>
  </form>
</aside>
<main class="main-content">
  {% block content %}{% endblock %}
</main>
</body>
</html>
