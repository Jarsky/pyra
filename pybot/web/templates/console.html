{% extends "base.html" %}
{% block title %}Console{% endblock %}
{% block content %}
<h2>Console</h2>

<div id="console-output"
     style="background:#0d1117;color:#c9d1d9;font-family:monospace;font-size:0.85rem;
            height:500px;overflow-y:auto;padding:1rem;border-radius:4px;margin-bottom:1rem">
  <div id="console-lines">
    <span style="color:#8b949e">— Connected to Pyra console —</span>
  </div>
</div>

<form id="console-form">
  <div style="display:flex;gap:0.5rem">
    <input type="text" id="console-input" name="command"
           placeholder="Enter command (e.g. .say #channel hello)"
           autocomplete="off" autocorrect="off" spellcheck="false"
           style="font-family:monospace">
    <button type="submit">Send</button>
  </div>
  <small style="color:var(--pico-muted-color)">
    Commands: <code>.help</code> &nbsp;
    <code>.say #chan msg</code> &nbsp;
    <code>.join #chan</code> &nbsp;
    <code>.part #chan</code> &nbsp;
    <code>.reload</code> &nbsp;
    <code>.who</code> &nbsp;
    <code>.channels</code>
  </small>
</form>

<script>
  const output = document.getElementById('console-output');
  const lines = document.getElementById('console-lines');
  const form = document.getElementById('console-form');
  const input = document.getElementById('console-input');

  const scheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
  const socket = new WebSocket(`${scheme}://${window.location.host}/console/ws`);

  function appendLine(text) {
    const div = document.createElement('div');
    div.className = 'log-line';
    div.textContent = text;
    lines.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  socket.addEventListener('open', () => appendLine('--- Web console connected ---'));
  socket.addEventListener('message', (event) => appendLine(event.data));
  socket.addEventListener('close', () => appendLine('--- Web console disconnected ---'));
  socket.addEventListener('error', () => appendLine('--- Web console error ---'));

  form.addEventListener('submit', (event) => {
    event.preventDefault();
    const cmd = input.value.trim();
    if (!cmd) {
      return;
    }
    socket.send(cmd);
    input.value = '';
    input.focus();
  });

  input.focus();
</script>
{% endblock %}
