services:
  pyra:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pyra
    restart: unless-stopped
    volumes:
      - ../data:/data
      - ../plugins_extra:/plugins_extra
    environment:
      - DATA_DIR=/data
      - DATABASE_URL=sqlite+aiosqlite:///data/pyra.db
    ports:
      - "8080:8080"
      - "127.0.0.1:3333:3333"
    networks:
      - pyra_net

networks:
  pyra_net:
    driver: bridge
